<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./images/favicon-32x32.png"
		/>
		<link rel="stylesheet" href="css/styles.css" />
		<title>Frontend Mentor | NFT preview card component</title>
	</head>
	<body>
		<main class="nft-preview">
			<article class="nft-card">
				<img
					class="nft-card__image"
					src="images/image-equilibrium.jpg"
					alt="nft preview picture"
				/>
				<div class="nft-card__image-overlay"></div>
				<img
					class="nft-card__view-image"
					src="images/icon-view.svg"
					alt="view image"
				/>
				<div class="nft-card__details">
					<h1 class="nft-card__title">Equilibrium #3429</h1>
					<p class="nft-card__bio">
						Our Equilibrium collection promotes balance and calm.
					</p>
					<div class="nft-card__stats">
						<p class="nft-card__price">
							<img
								src="images/icon-ethereum.svg"
								alt="Etherium icon picture"
							/>
							0.041 ETH
						</p>
						<p class="nft-card__time">
							<img
								src="images/icon-clock.svg"
								alt="Clock icon picture"
							/>
							3 days left
						</p>
					</div>
					<hr />
					<div class="nft-card__footer">
						<img
							class="nft-card__avatar"
							src="images/image-avatar.png"
							alt="creator's avatar picture"
						/>
						<p class="nft-card__creator">
							Creation of <span>Jules Wyvern</span>
						</p>
					</div>
				</div>
			</article>
		</main>
	</body>
</html>
